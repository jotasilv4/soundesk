<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SounDesk — Minimalist Sound Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/web/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <svg class="logo-icon" width="20" height="20" viewBox="0 0 76 65" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="white"/>
                </svg>
                <div class="logo-text">
                    <h1>SounDesk</h1>
                    <span class="divider">/</span>
                    <p class="subtitle">Real-time Audio Deck</p>
                </div>
            </div>
            <div id="connection-status" class="status-badge disconnected">
                <span class="status-dot"></span>
                <span class="status-text">Sem Conexão</span>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="app-main">
            <!-- Left Side: Sessions and Uploads -->
            <section class="control-panel">
                <div class="drawer-handle"></div>
                <!-- Sessions Card -->
                <div class="vercel-card" id="session-card">
                    <div class="card-header">
                        <h2>Sessões</h2>
                    </div>
                    <div class="card-body">
                        <!-- Create Session -->
                        <div class="input-group">
                            <label for="new-session-name">Criar Sessão</label>
                            <div class="flex-row">
                                <input type="text" id="new-session-name" placeholder="Ex: Produção, Discord" autocomplete="off">
                                <button id="btn-create-session" class="btn-vercel-primary">Criar</button>
                            </div>
                        </div>

                        <!-- Active Sessions List -->
                        <div class="sessions-list-container">
                            <label>Sessões Ativas</label>
                            <div id="sessions-list" class="sessions-list">
                                <p class="empty-state">Nenhuma sessão encontrada. Crie uma acima.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add Sound Card -->
                <div class="vercel-card" id="upload-card">
                    <div class="card-header">
                        <h2>Adicionar Áudio</h2>
                    </div>
                    <div class="card-body">
                        <form id="upload-form" enctype="multipart/form-data">
                            <div class="input-group">
                                <label for="sound-name">Nome do Áudio</label>
                                <input type="text" id="sound-name" name="name" placeholder="Ex: Corneta, Aplauso" required autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label for="sound-file" class="file-upload-label">
                                    <span class="upload-icon">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    </span>
                                    <span id="file-name-display">Escolher arquivo (MP3/WAV)</span>
                                    <input type="file" id="sound-file" name="file" accept="audio/mp3,audio/wav,audio/mpeg" required>
                                </label>
                            </div>
                            <button type="submit" id="btn-upload" class="btn-vercel-secondary w-100">Carregar Som</button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Right Side: Soundboard & Log -->
            <section class="soundboard-panel">
                <!-- Active Session Deck -->
                <div class="vercel-card deck-card disabled" id="deck-card">
                    <div class="card-header deck-header">
                        <div class="header-left">
                            <span class="session-tag">Modo Offline</span>
                            <h2 id="current-session-title">Escolha uma sessão</h2>
                        </div>
                        <div class="role-selector" id="role-selector-container" style="display: none;">
                            <button id="btn-stop-all" class="btn-vercel-danger">Parar Sons</button>
                            <span class="role-badge" id="role-badge">Indefinido</span>
                            <button id="btn-leave" class="btn-vercel-danger">Sair</button>
                        </div>
                    </div>

                    <div class="card-body deck-body">
                        <!-- Server Mode Status View -->
                        <div id="server-status-view" class="server-status-view" style="display: none;">
                            <div class="equalizer-container">
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                            </div>
                            <p class="server-status-note">O áudio sairá neste servidor.</p>
                        </div>

                        <!-- Sounds Grid -->
                        <div class="sounds-grid-container">
                            <h3>Biblioteca</h3>
                            <div id="sounds-grid" class="sounds-grid">
                                <p class="empty-state">Biblioteca vazia. Adicione sons acima.</p>
                            </div>
                        </div>

                        <!-- Real-time Activity Log -->
                        <div class="activity-log-container">
                            <h3>Histórico</h3>
                            <div id="activity-log" class="activity-log">
                                <p class="log-empty">Sem atividade.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Floating Mobile Controller Hub (Only on mobile + session active) -->
    <div id="drawer-backdrop" class="drawer-backdrop"></div>
    <div id="mobile-floating-control" class="mobile-floating-control">
        <!-- Status Indicator -->
        <div class="dock-status disconnected" id="dock-status" title="Sem Conexão">
            <span class="dock-status-dot"></span>
        </div>
        
        <div class="dock-divider"></div>
        
        <!-- Upload Sound Shortcut -->
        <button id="btn-mobile-upload" class="btn-floating btn-floating-upload" title="Adicionar Áudio">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <!-- Stop All Shortcut -->
        <button id="btn-mobile-stop" class="btn-floating btn-floating-danger" title="Parar Sons">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
            </svg>
        </button>

        <!-- Leave Session Shortcut -->
        <button id="btn-mobile-leave" class="btn-floating btn-floating-muted" title="Sair da Sessão">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </div>

    <script src="/web/app.js"></script>
</body>
</html>
